excluded:
  - fastlane
  - .build
  - build
  - Packages
  - Carthage
  - Pods
  - Shared/**/.build
  - Shared/**/.swiftpm

disabled_rules:
  - trailing_whitespace
  - contrasted_opening_brace
  - missing_docs
  - redundant_type_annotation
  - explicit_type_interface
  - identifier_name
  - vertical_whitespace
  - trailing_comma
  - line_length
  - multiple_closures_with_trailing_closure
  
opt-in_rules:
 - sorted_imports

# To set both levels implicitly, use an array.
type_body_length:
  - 500 # warning
  - 1000 # error
  
function_body_length:
  - 100

# To set both levels explicitly, use a dictionary.
file_length:
  warning: 500
  error: 1200
  
# Naming rules can set warnings/errors for `min_length` and `max_length`. Additionally, they can
# set excluded names and allowed symbols.
type_name:
  min_length: 4 # warning
  max_length: # warning and error
    warning: 40
    error: 50
  excluded: i(Phone|Pad|Pod) # regex pattern
  allowed_symbols: ["_"]

function_parameter_count:
  warning: 10
  error: 12
